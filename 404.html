<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Pagină negăsită | YieldGuard</title>
  <link rel="icon" href="/assets/logo-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .error-page {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem;
    }
    .error-page h1 { font-size: 2rem; margin: 0 0 1rem; }
    .error-page p { color: var(--slate); max-width: 28rem; margin: 0 auto 2rem; }
    .error-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <main class="error-page">
    <div>
      <img src="/assets/logo.svg" alt="YieldGuard" height="32" style="margin-bottom:2rem">
      <h1>Pagină negăsită</h1>
      <p>Adresa accesată nu există. YieldGuard — mentenanță parcuri fotovoltaice în România (Woma Ecoserv S.R.L.).</p>
      <div class="error-actions">
        <a href="/ro/" class="btn btn-primary">Acasă (RO)</a>
        <a href="/" class="btn btn-outline">Home (EN)</a>
      </div>
    </div>
  </main>
</body>
</html>
